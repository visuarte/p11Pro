syntax = "proto3";

package kolicode.engine.v1;

import "common.proto";
import "render.proto";

message EngineRequest {
  kolicode.common.v1.RequestMetadata metadata = 1;
  string operation = 2;
  bytes payload = 3;
  map<string, string> options = 4;
}

message EngineResponse {
  bool success = 1;
  string operation = 2;
  string message = 3;
  bytes payload = 4;
  map<string, string> metadata = 5;
}

service ThunderKoliService {
  rpc CheckHealth(kolicode.common.v1.HealthCheckRequest) returns (kolicode.common.v1.HealthCheckResponse);
  rpc ExecuteOperation(EngineRequest) returns (EngineResponse);
}

service UniversalEngineService {
  rpc CheckHealth(kolicode.common.v1.HealthCheckRequest) returns (kolicode.common.v1.HealthCheckResponse);
  rpc ExecuteOperation(EngineRequest) returns (EngineResponse);
}

service DesignStudioService {
  rpc CheckHealth(kolicode.common.v1.HealthCheckRequest) returns (kolicode.common.v1.HealthCheckResponse);
  rpc ExecuteOperation(EngineRequest) returns (EngineResponse);
  rpc RenderAsset(kolicode.render.v1.RenderRequest) returns (kolicode.render.v1.RenderResponse);
}
