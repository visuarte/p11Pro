syntax = "proto3";

package kolicode.bridge.v1;

import "common.proto";

enum BridgeLifecycleState {
  BRIDGE_LIFECYCLE_STATE_UNSPECIFIED = 0;
  BRIDGE_LIFECYCLE_STATE_IDLE = 1;
  BRIDGE_LIFECYCLE_STATE_AUTHENTICATING = 2;
  BRIDGE_LIFECYCLE_STATE_PROCESSING_VECTOR = 3;
  BRIDGE_LIFECYCLE_STATE_COMPUTING_COLOR = 4;
  BRIDGE_LIFECYCLE_STATE_AUDITING = 5;
  BRIDGE_LIFECYCLE_STATE_COMPLETED = 6;
  BRIDGE_LIFECYCLE_STATE_ERROR = 7;
}

message GetBridgeStateRequest {
  kolicode.common.v1.RequestMetadata metadata = 1;
}

message GetBridgeStateResponse {
  BridgeLifecycleState current_state = 1;
  BridgeLifecycleState previous_state = 2;
  int64 transition_time_ms = 3;
  string error_message = 4;
  map<string, string> metadata = 5;
}

service BridgeControlService {
  rpc CheckHealth(kolicode.common.v1.HealthCheckRequest) returns (kolicode.common.v1.HealthCheckResponse);
  rpc GetBridgeState(GetBridgeStateRequest) returns (GetBridgeStateResponse);
}
