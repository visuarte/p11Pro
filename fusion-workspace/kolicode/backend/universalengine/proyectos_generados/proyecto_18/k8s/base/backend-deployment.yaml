apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyecto18-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proyecto18-backend
  template:
    metadata:
      labels:
        app: proyecto18-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/proyecto18-backend:latest
          ports:
            - containerPort: 8040
          env:
            - name: PORT
              value: "8040"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: proyecto18-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: proyecto18-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proyecto18-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /health
              port: 8040
          livenessProbe:
            httpGet:
              path: /health
              port: 8040
