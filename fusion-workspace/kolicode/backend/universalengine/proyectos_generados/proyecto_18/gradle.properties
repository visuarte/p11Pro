# Propiedad para forzar la JDK que Gradle debe usar a nivel de proyecto
# Esto fija JAVA para builds locales y evita dependencias del sistema que cambien
# Ajustado automáticamente por el asistente según el JAVA_HOME detectado (/opt/homebrew/opt/openjdk@21)
org.gradle.java.home=/opt/homebrew/opt/openjdk@21

# Si prefieres usar la JDK seleccionada por `/usr/libexec/java_home`, comenta la línea anterior
# y descomenta la siguiente (ejemplo de Temurin 25 detectado):
# org.gradle.java.home=/Users/visuarte/Library/Java/JavaVirtualMachines/temurin-25.0.2/Contents/Home

