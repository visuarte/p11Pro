name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fusion-workspace/kolicode/backend/universalengine/proyectos_generados/proyecto_18/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Backend tests
        run: ./gradlew --no-daemon test build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fusion-workspace/kolicode/backend/universalengine/proyectos_generados/proyecto_18/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fusion-workspace/kolicode/backend/universalengine/proyectos_generados/proyecto_18/frontend/package-lock.json
      - name: Frontend build
        run: npm ci --no-audit --no-fund && npm run build

  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fusion-workspace/kolicode/backend/universalengine/proyectos_generados/proyecto_18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prepare scripts
        run: |
          chmod +x backend/gradlew
          chmod +x scripts/tests/smoke_checklist.sh
      - name: Smoke validation
        run: ./scripts/tests/smoke_checklist.sh
