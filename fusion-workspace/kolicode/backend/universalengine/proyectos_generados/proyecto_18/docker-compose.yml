version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ciberpunk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ciberpunk
      DB_USER: postgres
      DB_PASSWORD: postgres
      SKIP_DB_INIT: "1"
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8080
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:

# Usage:
# 1) Build images and bring up services:
#    docker-compose up --build -d
# 2) See logs:
#    docker-compose logs -f
# 3) Tear down:
#    docker-compose down

