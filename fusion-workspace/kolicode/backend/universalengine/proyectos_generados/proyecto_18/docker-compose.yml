services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ciberpunk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ciberpunk"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ciberpunk
      DB_USER: postgres
      DB_PASSWORD: postgres
      SKIP_DB_INIT: "0"
      PORT: 8040
    ports:
      - "8040:8040"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8040
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:

# Usage:
# 1) Build images and bring up services:
#    docker-compose up --build -d
# 2) See logs:
#    docker-compose logs -f
# 3) Tear down:
#    docker-compose down
