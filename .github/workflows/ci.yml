name: CI - Frontend build

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  build-frontend:
    name: Build frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend deps
        run: |
          cd fusion-workspace/kolicode/frontend
          # try clean install from lockfile first; if lockfile and package.json are out of sync
          # fall back to `npm install` to reconcile versions (useful for audit-fix PRs)
          if npm ci; then
            echo "npm ci succeeded"
          else
            echo "npm ci failed (lockfile mismatch). Falling back to npm install to reconcile packages"
            npm install
          fi

      - name: Build frontend
        run: |
          cd fusion-workspace/kolicode/frontend
          npm run build

